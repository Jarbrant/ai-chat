<!DOCTYPE html>
<html>
<head>
  <title>AI Chat</title>

  <!-- 🎨 STYLE -->
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      padding: 16px;
      font-size: 20px;
      font-weight: bold;
      border-bottom: 1px solid #1e293b;
    }

    #chat {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .message {
      margin-bottom: 12px;
      max-width: 70%;
      padding: 10px 14px;
      border-radius: 12px;
    }

    .user {
      background: #2563eb;
      align-self: flex-end;
    }

    .ai {
      background: #1e293b;
      align-self: flex-start;
    }

    .loading {
      opacity: 0.6;
      font-style: italic;
    }

    #inputArea {
      display: flex;
      padding: 10px;
      border-top: 1px solid #1e293b;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    button {
      margin-left: 10px;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.5;
    }
  </style>
</head>

<body>

<!-- 🧠 HEADER -->
<header>AI Chat</header>

<!-- 💬 CHAT AREA -->
<div id="chat"></div>

<!-- ⌨️ INPUT -->
<div id="inputArea">
  <input id="input" placeholder="Skriv något..." />
  <button id="sendBtn" onclick="send()">Skicka</button>
</div>

<script>

/* =========================================================
   📦 STATE (minne i browsern)
   ========================================================= */

// 🔹 Försök ladda tidigare konversation från localStorage
// 🔹 Om inget finns → starta tom array
let history = JSON.parse(localStorage.getItem("chat_history")) || [];

// 🔹 Hjälpfunktion: spara historik varje gång den ändras
function saveHistory() {
  localStorage.setItem("chat_history", JSON.stringify(history));
}

/* =========================================================
   🧰 DOM REFERENCES
   ========================================================= */

const chat = document.getElementById("chat");
const input = document.getElementById("input");
const button = document.getElementById("sendBtn");


/* =========================================================
   💬 UI: visa meddelanden
   ========================================================= */

function addMessage(text, type, extra = "") {
  const div = document.createElement("div");

  div.className = "message " + type + " " + extra;
  div.innerText = text;

  chat.appendChild(div);

  // auto-scroll
  chat.scrollTop = chat.scrollHeight;

  return div;
}

/* =========================================================
   🚀 HUVUDFUNKTION (förbättrad + stabil)
   ========================================================= */

async function send() {

  // 🧹 1. Hämta & validera input
  const text = input.value.trim();
  if (!text) return;

  // 👤 2. Visa user i UI direkt
  addMessage(text, "user");

  // 🧠 3. Spara i minne + localStorage
  history.push({
    role: "user",
    content: text
  });
  saveHistory(); // 🔥 ny förbättring

  // 🔒 4. Lås UI medan vi väntar
  input.value = "";
  input.disabled = true;
  button.disabled = true;

  // ⏳ 5. Visa loading
  const loading = addMessage("AI tänker...", "ai", "loading");

  try {

    /* =========================================================
       🌐 API CALL (med historik)
       ========================================================= */

    const res = await fetch("https://ai-chat.andersmenyit.workers.dev", {
      method: "POST",
      mode: "cors",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        messages: history // 🔥 skickar HEL konversation
      })
    });

    console.log("Status:", res.status);

    // 🔴 extra skydd
    if (!res.ok) {
      throw new Error("Server svarade inte korrekt");
    }

    const data = await res.json();
    console.log("Svar:", data);

    // 🧹 ta bort loading
    loading.remove();

    /* =========================================================
       🧠 HANTERA SVAR
       ========================================================= */

    if (data.reply) {

      // 💬 visa AI svar
      addMessage(data.reply, "ai");

      // 🧠 spara AI svar
      history.push({
        role: "assistant",
        content: data.reply
      });

      saveHistory(); // 🔥 ny förbättring

    } else if (data.error) {

      addMessage("⚠️ " + data.error, "ai");

    } else {

      addMessage("⚠️ Okänt svar från AI", "ai");
    }

  } catch (err) {

    // 🧹 ta bort loading
    loading.remove();

    console.error("FETCH ERROR:", err);

    addMessage("❌ Kunde inte nå servern", "ai");
  }

  // 🔓 6. Återställ UI
  input.disabled = false;
  button.disabled = false;
  input.focus();
}

/* =========================================================
   ⌨️ ENTER = skicka
   ========================================================= */

input.addEventListener("keypress", e => {
  if (e.key === "Enter") send();
});

</script>

</body>
</html>
