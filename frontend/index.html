<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>AI Chat</title>
  <style>
    body { font-family: sans-serif; background: #f3f3f3; }
    #chatbox { max-width: 500px; margin: 3em auto; background: #fff; padding: 2em; border-radius: 12px; box-shadow: 0 2px 8px #ddd; }
    #messages { min-height: 200px; margin-bottom: 1em; }
    .bubble { display: block; max-width: 80%; margin: .5em 0; padding: 1em; border-radius: 12px; }
    .you { background: #d6edff; margin-left: auto; }
    .ai { background: #e1fbe1; margin-right: auto; }
    #chat-form { display: flex; gap: .5em; }
    #chat-input { flex: 1; padding: .6em; border-radius: 6px; border: 1px solid #aaa; }
    #chat-send { padding: 0 .8em; }
  </style>
</head>
<body>
  <div id="chatbox">
    <div id="messages"></div>
    <form id="chat-form" autocomplete="off">
      <input id="chat-input" type="text" placeholder="Skriv ditt meddelande..." required>
      <button id="chat-send" type="submit">Skicka</button>
    </form>
  </div>
  <script>
    // ÄNDRA DEN HÄR URL:en till din Cloudflare Worker, om du har en custom domän!
    const API_URL = "https://ai-chat.andersmenyit.workers.dev/";

    const messagesEl = document.getElementById('messages');
    const formEl = document.getElementById('chat-form');
    const inputEl = document.getElementById('chat-input');

    // Visa ett meddelande i chatten
    function addBubble(text, who) {
      const div = document.createElement('div');
      div.className = 'bubble ' + who;
      div.textContent = text;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    // Hantera att användaren skickar ett chattmeddelande
    formEl.onsubmit = async (e) => {
      e.preventDefault();
      const prompt = inputEl.value;
      addBubble(prompt, 'you');
      inputEl.value = '';
      addBubble('...', 'ai'); // Visa laddningsbubbla

      // Skicka POST till Cloudflare Worker
      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ prompt })
        });
        const data = await response.json();
        // Plocka ut AI:ets svar (anpassa om du använder annat API)
        let aiMsg = data.choices?.[0]?.message?.content || "Inget svar från AI.";
        // Ta bort laddningsbubblan och visa svaret
        messagesEl.removeChild(messagesEl.querySelector('.ai:last-child'));
        addBubble(aiMsg.trim(), 'ai');
      } catch (err) {
        messagesEl.removeChild(messagesEl.querySelector('.ai:last-child'));
        addBubble("Fel vid kontakt med servern.", "ai");
      }
    };
  </script>
</body>
</html>
