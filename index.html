<!DOCTYPE html>
<html>
<head>
  <title>AI Chat</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      padding: 16px;
      font-size: 20px;
      font-weight: bold;
      border-bottom: 1px solid #1e293b;
    }

    /* 🧭 MODES */
    #modes {
      display: flex;
      gap: 10px;
      padding: 10px 20px;
      border-bottom: 1px solid #1e293b;
    }

    #modes button {
      background: #1e293b;
      border: none;
      padding: 6px 12px;
      border-radius: 20px;
      color: white;
      cursor: pointer;
    }

    #modes button.active {
      background: #2563eb;
    }

    /* 🧠 FOCUS BOX */
    #focusBox {
      padding: 16px 20px;
      border-bottom: 1px solid #1e293b;
      background: #020617;
    }

    #focusTitle {
      font-size: 12px;
      opacity: 0.6;
    }

    #focusContent {
      font-size: 18px;
      font-weight: 500;
    }

    #app {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    #chat {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* 🔝 INPUT FIXED TOP */
    #inputBar {
      position: sticky;
      top: 0;
      display: flex;
      gap: 10px;
      padding: 10px;
      background: #0f172a;
      border-bottom: 1px solid #1e293b;
      z-index: 10;
    }

    textarea {
      flex: 1;
      padding: 14px;
      border-radius: 12px;
      border: none;
      outline: none;
      resize: none;
      font-family: inherit;
      font-size: 14px;
      max-height: 150px;
    }

    button {
      padding: 12px 16px;
      border: none;
      border-radius: 12px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.5;
    }

    .message {
      padding: 12px 16px;
      border-radius: 14px;
      max-width: 60%;
      line-height: 1.4;
    }

    .user {
      align-self: flex-end;
      background: #2563eb;
    }

    .ai {
      align-self: flex-start;
      background: #1e293b;
    }

    .loading {
      opacity: 0.6;
      font-style: italic;
    }
  </style>
</head>

<body>

<header>AI Chat</header>

<!-- 🧭 MODES -->
<div id="modes">
  <button onclick="setMode('advisor')" class="active">Rådgivare</button>
  <button onclick="setMode('friend')">Vän</button>
  <button onclick="setMode('teacher')">Lärare</button>
</div>

<!-- 🧠 FOCUS -->
<div id="focusBox">
  <div id="focusTitle">Vad ni pratar om</div>
  <div id="focusContent">–</div>
</div>

<div id="app">

  <!-- 🔝 INPUT -->
  <div id="inputBar">
    <textarea id="input" rows="1" placeholder="Skriv något..."></textarea>
    <button id="sendBtn">➤</button>
  </div>

  <!-- 💬 CHAT -->
  <div id="chat"></div>

</div>

<script>

/* =========================================================
   📦 STATE
   ========================================================= */

let history = JSON.parse(localStorage.getItem("chat_history")) || [];
let mode = "advisor";

function saveHistory() {
  localStorage.setItem("chat_history", JSON.stringify(history));
}

/* =========================================================
   🧰 DOM
   ========================================================= */

const chat = document.getElementById("chat");
const input = document.getElementById("input");
const button = document.getElementById("sendBtn");
const focus = document.getElementById("focusContent");

/* =========================================================
   🧭 MODE SWITCH
   ========================================================= */

function setMode(newMode) {
  mode = newMode;

  document.querySelectorAll("#modes button").forEach(btn => {
    btn.classList.remove("active");
  });

  event.target.classList.add("active");
}

/* =========================================================
   💬 UI
   ========================================================= */

function addMessage(text, type, extra = "") {
  const div = document.createElement("div");
  div.className = "message " + type + " " + extra;
  div.innerText = text;

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;

  return div;
}

/* =========================================================
   🧠 FOCUS UPDATE
   ========================================================= */

function updateFocus(text) {
  focus.innerText = text.slice(0, 120);
}

/* =========================================================
   🔄 LOAD HISTORY (SMART)
   ========================================================= */

const MAX_VISIBLE = 20;
history.slice(-MAX_VISIBLE).forEach(msg => {
  addMessage(msg.content, msg.role === "user" ? "user" : "ai");
});

/* =========================================================
   📏 AUTO RESIZE
   ========================================================= */

input.addEventListener("input", () => {
  input.style.height = "auto";
  input.style.height = input.scrollHeight + "px";
});

/* =========================================================
   🚀 SEND
   ========================================================= */

async function send() {

  const text = input.value.trim();
  if (!text) return;

  addMessage(text, "user");

  history.push({ role: "user", content: text });
  saveHistory();

  input.value = "";
  input.style.height = "auto";

  input.disabled = true;
  button.disabled = true;

  const loading = addMessage("AI tänker...", "ai", "loading");

  try {

    const res = await fetch("https://ai-chat.andersmenyit.workers.dev", {
      method: "POST",
      mode: "cors",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        messages: history,
        mode: mode
      })
    });

    if (!res.ok) throw new Error("Server error");

    const data = await res.json();

    loading.remove();

    if (data.reply) {
      addMessage(data.reply, "ai");

      history.push({
        role: "assistant",
        content: data.reply
      });

      saveHistory();

      // 🧠 uppdatera fokus
      updateFocus(data.reply);
    }

  } catch (err) {
    loading.remove();
    addMessage("❌ Kunde inte nå servern", "ai");
  }

  input.disabled = false;
  button.disabled = false;
  input.focus();
}

/* =========================================================
   ⌨️ KEYBOARD
   ========================================================= */

input.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});

button.addEventListener("click", send);

</script>

</body>
</html>
