<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>ai-chat</title>
  <style>
    #chatbox { max-width: 500px; margin: 2em auto; }
    #messages { background: #eee; padding: 1em; min-height: 150px; border-radius: 8px; }
    .bubble { padding: 0.5em; margin: 0.5em 0; border-radius: 8px; }
    .you { background: #d0ebff; text-align: right; }
    .ai { background: #e6f4ea; text-align: left; }
  </style>
</head>
<body>
  <div id="chatbox">
    <div id="messages"></div>
    <form id="form">
      <input id="input" type="text" placeholder="Skriv ditt meddelande..." required style="width:80%;">
      <button>Skicka</button>
    </form>
  </div>
  <script>
    const api = "https://ai-chat.andersmenyit.workers.dev/"; // Byt till din Cloudflare worker-url om annan!
    const messages = document.getElementById('messages');
    document.getElementById('form').onsubmit = async e => {
      e.preventDefault();
      const text = document.getElementById('input').value;
      addMsg(text, "you");
      document.getElementById('input').value = '';
      const res = await fetch(api, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ prompt: text })
      });
      const data = await res.json();
      addMsg(data.choices?.[0]?.message?.content || "Inget AI-svar", "ai");
    };

    function addMsg(text, who) {
      const div = document.createElement('div');
      div.className = `bubble ${who}`;
      div.textContent = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }
  </script>
</body>
</html>
