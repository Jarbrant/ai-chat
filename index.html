<!DOCTYPE html>
<html>
<head>
  <title>AI Chat</title>

  <!-- 🎨 STYLE -->
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      padding: 16px;
      font-size: 20px;
      font-weight: bold;
      border-bottom: 1px solid #1e293b;
    }

    #chat {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .message {
      margin-bottom: 12px;
      max-width: 70%;
      padding: 10px 14px;
      border-radius: 12px;
    }

    .user {
      background: #2563eb;
      align-self: flex-end;
    }

    .ai {
      background: #1e293b;
      align-self: flex-start;
    }

    #inputArea {
      display: flex;
      padding: 10px;
      border-top: 1px solid #1e293b;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    button {
      margin-left: 10px;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<!-- 🧠 HEADER -->
<header>AI Chat</header>

<!-- 💬 CHAT AREA -->
<div id="chat"></div>

<!-- ⌨️ INPUT -->
<div id="inputArea">
  <input id="input" placeholder="Skriv något..." />
  <button onclick="send()">Skicka</button>
</div>

<script>
const chat = document.getElementById("chat");


// ➕ Lägg till meddelande i UI
function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = "message " + type;
  div.innerText = text;
  chat.appendChild(div);

  // scroll ner automatiskt
  chat.scrollTop = chat.scrollHeight;
}


// 🚀 HUVUDFUNKTION (SKICKA MEDDELANDE)
async function send() {

  // 📥 hämta input
  const input = document.getElementById("input");
  const text = input.value;

  console.log("🟡 Sending:", text);

  if (!text) return;

  // visa i chat
  addMessage(text, "user");

  // rensa input
  input.value = "";

  try {

    // 🌐 SKICKA TILL DIN WORKER
    const res = await fetch("https://ai-chat.andersmenyit.workers.dev", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        prompt: text   // ⚠️ viktigt: backend förväntar sig "prompt"
      })
    });

    console.log("🟢 Response status:", res.status);

    const data = await res.json();
    console.log("🟢 Data:", data);

    // 💬 visa AI svar
    if (data.reply) {
     addMessage(data.reply, "ai");
    }

  } catch (err) {

    console.error("🔴 ERROR:", err);

    addMessage("❌ Fel vid kontakt med server", "ai");
  }
}


// ⌨️ ENTER = skicka
document.getElementById("input").addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    send();
  }
});
</script>

</body>
</html>
