<!DOCTYPE html>
<html>
<head>
  <title>AI Chat</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      padding: 16px;
      font-size: 20px;
      font-weight: bold;
      border-bottom: 1px solid #1e293b;
    }

    #app {
      flex: 1;
      position: relative;
    }

    #chat {
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    /* ✨ Center input */
    #centerBox {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      width: 60%;
      max-width: 600px;
    }

    /* 🔽 när chat startar */
    body.chat-started #centerBox {
      top: auto;
      bottom: 10px;
      transform: translateX(-50%);
    }

    input {
      flex: 1;
      padding: 14px;
      border-radius: 10px;
      border: none;
      outline: none;
    }

    button {
      margin-left: 10px;
      padding: 14px 18px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.5;
    }

    .message {
      margin: 10px 0;
      padding: 12px 16px;
      border-radius: 14px;
      max-width: 60%;
      line-height: 1.4;
    }

    .user {
      align-self: flex-end;
      background: #2563eb;
    }

    .ai {
      align-self: flex-start;
      background: #1e293b;
    }

    .loading {
      opacity: 0.6;
      font-style: italic;
    }
  </style>
</head>

<body>

<header>AI Chat</header>

<div id="app">
  <div id="chat"></div>

  <div id="centerBox">
    <input id="input" placeholder="Skriv något..." />
    <button id="sendBtn">Skicka</button>
  </div>
</div>

<script>

/* =========================================================
   📦 STATE (localStorage)
   ========================================================= */

let history = JSON.parse(localStorage.getItem("chat_history")) || [];

function saveHistory() {
  localStorage.setItem("chat_history", JSON.stringify(history));
}

/* =========================================================
   🧰 DOM
   ========================================================= */

const chat = document.getElementById("chat");
const input = document.getElementById("input");
const button = document.getElementById("sendBtn");

/* =========================================================
   💬 UI
   ========================================================= */

function addMessage(text, type, extra = "") {
  const div = document.createElement("div");
  div.className = "message " + type + " " + extra;
  div.innerText = text;

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;

  return div;
}

/* =========================================================
   🔄 LOAD HISTORY
   ========================================================= */

history.forEach(msg => {
  addMessage(msg.content, msg.role === "user" ? "user" : "ai");
});

if (history.length > 0) {
  document.body.classList.add("chat-started");
}

/* =========================================================
   🚀 SEND
   ========================================================= */

async function send() {

  const text = input.value.trim();
  if (!text) return;

  // 🟢 aktivera chatläge
  document.body.classList.add("chat-started");

  addMessage(text, "user");

  history.push({ role: "user", content: text });
  saveHistory();

  input.value = "";
  input.disabled = true;
  button.disabled = true;

  const loading = addMessage("AI tänker...", "ai", "loading");

  try {

    const res = await fetch("https://ai-chat.andersmenyit.workers.dev", {
      method: "POST",
      mode: "cors",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        messages: history
      })
    });

    if (!res.ok) throw new Error("Server error");

    const data = await res.json();

    loading.remove();

    if (data.reply) {
      addMessage(data.reply, "ai");

      history.push({
        role: "assistant",
        content: data.reply
      });

      saveHistory();

    } else {
      addMessage("⚠️ Inget svar från AI", "ai");
    }

  } catch (err) {
    loading.remove();
    console.error(err);
    addMessage("❌ Kunde inte nå servern", "ai");
  }

  input.disabled = false;
  button.disabled = false;
  input.focus();
}

/* =========================================================
   ⌨️ EVENTS
   ========================================================= */

button.addEventListener("click", send);

input.addEventListener("keypress", e => {
  if (e.key === "Enter") send();
});

</script>

</body>
</html>
