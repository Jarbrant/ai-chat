<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <title>Personlig AI-chatt</title>
  <style>
    body { background:#f3f3f3; }
    #chatbox { max-width: 500px; margin: 2em auto; background: #fff; padding: 2em; border-radius: 12px; box-shadow: 0 2px 8px #ddd; }
    #messages { min-height: 200px; margin-bottom: 1em; }
    .bubble { display: block; max-width: 80%; margin: .5em 0; padding: 1em; border-radius: 12px; }
    .you { background: #d6edff; margin-left: auto; }
    .ai { background: #e1fbe1; margin-right: auto; }
    #chat-form { display: flex; gap: .5em; }
    #chat-input { flex: 1; padding: .6em; border-radius: 6px; border: 1px solid #aaa; }
    #chat-send { padding: 0 .8em; }
  </style>
</head>
<body>
  <div id="chatbox">
    <h2>Personlig AI-chatt</h2>
    <div id="messages"></div>
    <form id="chat-form" autocomplete="off">
      <input id="chat-input" type="text" placeholder="Skriv ditt meddelande..." required />
      <button id="chat-send" type="submit">Skicka</button>
    </form>
  </div>
<script>
  // Ändra nedan till din Cloudflare Worker URL om nödvändigt!
  const API_URL = "https://ai-chat.andersmenyit.workers.dev/";

  // Starta chatt-historiken med "system"-roll (personlig AI)
  let chatHistory = [
    { role: "system", content: "Du är en personlig AI-assistent åt Jarbrant. Var hjälpsam och trevlig." }
  ];

  const messagesEl = document.getElementById('messages');
  const formEl = document.getElementById('chat-form');
  const inputEl = document.getElementById('chat-input');

  function addBubble(text, who) {
    const div = document.createElement('div');
    div.className = 'bubble ' + who;
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  formEl.onsubmit = async e => {
    e.preventDefault();
    const prompt = inputEl.value.trim();
    if (!prompt) return;
    addBubble(prompt, 'you');
    chatHistory.push({ role: "user", content: prompt });
    inputEl.value = '';
    addBubble('...', 'ai');

    try {
      const response = await fetch(API_URL, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ messages: chatHistory })
      });
      const data = await response.json();
      let aiMsg = data.choices?.[0]?.message?.content || "Inget svar från AI.";
      chatHistory.push({ role: "assistant", content: aiMsg });
      // Ta bort "..." och visa AI:ets riktiga svar
      messagesEl.removeChild(messagesEl.querySelector('.ai:last-child'));
      addBubble(aiMsg.trim(), 'ai');
    } catch (err) {
      messagesEl.removeChild(messagesEl.querySelector('.ai:last-child'));
      addBubble("Fel vid kontakt med servern.", "ai");
    }
  };
</script>
</body>
</html>
