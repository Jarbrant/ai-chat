<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>AI Chat</title>
  <style>
    body { font-family: sans-serif; background: #eee; }
    #chat { max-width: 500px; margin: 2rem auto; background: #fff; padding: 2rem; border-radius: 8px; }
    #messages { min-height: 200px; margin-bottom: 1rem; }
    .bubble { margin: .5rem 0; padding: .75rem; border-radius: 8px; max-width: 80%; }
    .you   { background: #cce5ff; margin-left: auto; }
    .ai    { background: #ddeccd; margin-right: auto; }
  </style>
</head>
<body>
  <div id="chat">
    <div id="messages"></div>
    <form id="form">
      <input type="text" id="prompt" required autocomplete="off" placeholder="Skriv ett meddelande..." style="width:70%;">
      <button>Skicka</button>
    </form>
  </div>
  <script>
    const form = document.getElementById('form');
    const input = document.getElementById('prompt');
    const messages = document.getElementById('messages');

    form.addEventListener('submit', async e => {
      e.preventDefault();
      const prompt = input.value;
      addMessage(prompt, 'you');
      input.value = '';
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt })
      });
      const data = await response.json();
      // Anpassa nedan utifrån svaret OpenAI returnerar
      const aiMsg = data.choices?.[0]?.message?.content || 'Inget svar';
      addMessage(aiMsg, 'ai');
    });

    function addMessage(text, who) {
      const div = document.createElement('div');
      div.className = `bubble ${who}`;
      div.textContent = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }
  </script>
</body>
</html>
