<!DOCTYPE html>
<html>
<head>
  <title>AI Chat</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      padding: 16px;
      font-size: 20px;
      font-weight: bold;
      border-bottom: 1px solid #1e293b;
    }

    #chat {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .message {
      margin-bottom: 12px;
      max-width: 70%;
      padding: 10px 14px;
      border-radius: 12px;
    }

    .user {
      background: #2563eb;
      align-self: flex-end;
    }

    .ai {
      background: #1e293b;
      align-self: flex-start;
    }

    .loading {
      opacity: 0.6;
      font-style: italic;
    }

    #inputArea {
      display: flex;
      padding: 10px;
      border-top: 1px solid #1e293b;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    button {
      margin-left: 10px;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.5;
    }
  </style>
</head>

<body>

<header>AI Chat</header>

<div id="chat"></div>

<div id="inputArea">
  <input id="input" placeholder="Skriv något..." />
  <button id="sendBtn" onclick="send()">Skicka</button>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");
const button = document.getElementById("sendBtn");

// ➕ visa meddelande
function addMessage(text, type, extra = "") {
  const div = document.createElement("div");
  div.className = "message " + type + " " + extra;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

// 🚀 skicka
async function send() {
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, "user");

  input.value = "";
  input.disabled = true;
  button.disabled = true;

  const loading = addMessage("AI tänker...", "ai", "loading");

  try {
    const res = await fetch("https://ai-chat.andersmenyit.workers.dev", {
      method: "POST",
      mode: "cors", // ✅ FIX
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ prompt: text })
    });

    console.log("Status:", res.status);

    const data = await res.json();
    console.log("Svar:", data);

    loading.remove();

    if (data.reply) {
      addMessage(data.reply, "ai");
    } else if (data.error) {
      addMessage("⚠️ " + data.error, "ai");
    } else {
      addMessage("⚠️ Okänt svar från AI", "ai");
    }

  } catch (err) {
    loading.remove();

    console.error("FETCH ERROR:", err);

    addMessage("❌ Kunde inte nå servern", "ai");
  }

  input.disabled = false;
  button.disabled = false;
  input.focus();
}

// ENTER = skicka
input.addEventListener("keypress", e => {
  if (e.key === "Enter") send();
});
</script>

</body>
</html>
