<!DOCTYPE html>
<html>
<head>
  <title>AI Chat</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      padding: 16px;
      font-size: 20px;
      font-weight: bold;
      border-bottom: 1px solid #1e293b;
    }

    #app {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    #chat {
      flex: 1;
      margin-top: 70px; /* istället för padding-top bug */
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      scroll-behavior: smooth;
    }

    #centerBox {
      position: fixed;
      top: 0;
      width: 100%;
      max-width: 800px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      padding: 10px;
      background: #0f172a;
      border-bottom: 1px solid #1e293b;
      z-index: 10;
    }

    textarea {
      flex: 1;
      padding: 14px;
      border-radius: 12px;
      border: none;
      outline: none;
      resize: none;
      font-family: inherit;
      font-size: 14px;
      line-height: 1.4;
      max-height: 150px;
      overflow-y: auto;
    }

    button {
      padding: 14px 18px;
      border: none;
      border-radius: 12px;
      background: #2563eb;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    button:active {
      transform: scale(0.95);
    }

    button:disabled {
      opacity: 0.5;
    }

    .message {
      margin: 10px 0;
      padding: 12px 16px;
      border-radius: 14px;
      max-width: 60%;
      line-height: 1.4;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .user {
      align-self: flex-end;
      background: #2563eb;
    }

    .ai {
      align-self: flex-start;
      background: #1e293b;
    }

    .loading {
      opacity: 0.6;
      font-style: italic;
    }
  </style>
</head>

<body>

<header>AI Chat</header>

<div id="app">
  <div id="chat"></div>

  <div id="centerBox">
    <textarea id="input" rows="1" placeholder="Skriv något..."></textarea>
    <button id="sendBtn">➤</button>
  </div>
</div>

<script>

/* =========================================================
   📦 STATE
   ========================================================= */

let history = JSON.parse(localStorage.getItem("chat_history")) || [];

function saveHistory() {
  localStorage.setItem("chat_history", JSON.stringify(history));
}

/* =========================================================
   🧰 DOM
   ========================================================= */

const chat = document.getElementById("chat");
const input = document.getElementById("input");
const button = document.getElementById("sendBtn");

/* =========================================================
   💬 UI
   ========================================================= */

function addMessage(text, type, extra = "") {
  const div = document.createElement("div");
  div.className = "message " + type + " " + extra;
  div.innerText = text;

  chat.appendChild(div);

  smartScroll();

  return div;
}

/* =========================================================
   🧠 SCROLL (STABIL VERSION)
   ========================================================= */

function smartScroll() {
  requestAnimationFrame(() => {
    chat.scrollTop = chat.scrollHeight;
  });
}

/* =========================================================
   🔄 LOAD HISTORY
   ========================================================= */

history.forEach(msg => {
  addMessage(msg.content, msg.role === "user" ? "user" : "ai");
});

/* 🧭 FIX: start alltid högst upp */
setTimeout(() => {
  chat.scrollTop = 0;
}, 0);

/* =========================================================
   📏 AUTO RESIZE TEXTAREA
   ========================================================= */

input.addEventListener("input", () => {
  input.style.height = "auto";
  input.style.height = input.scrollHeight + "px";
});

/* =========================================================
   🚀 SEND
   ========================================================= */

async function send() {

  const text = input.value.trim();
  if (!text) return;

  addMessage(text, "user");

  history.push({ role: "user", content: text });
  saveHistory();

  input.value = "";
  input.style.height = "auto";

  input.disabled = true;
  button.disabled = true;

  const loading = addMessage("AI tänker...", "ai", "loading");

  try {

    const res = await fetch("https://ai-chat.andersmenyit.workers.dev", {
      method: "POST",
      mode: "cors",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        messages: history
      })
    });

    if (!res.ok) throw new Error("Server error");

    const data = await res.json();

    loading.remove();

    if (data.reply) {
      addMessage(data.reply, "ai");

      history.push({
        role: "assistant",
        content: data.reply
      });

      saveHistory();
    }

  } catch (err) {
    loading.remove();
    addMessage("❌ Kunde inte nå servern", "ai");
  }

  input.disabled = false;
  button.disabled = false;
  input.focus();
}

/* =========================================================
   ⌨️ KEYBOARD
   ========================================================= */

input.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});

button.addEventListener("click", send);

</script>

</body>
</html>
